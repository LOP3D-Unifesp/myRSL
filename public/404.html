<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      (function () {
        var path = window.location.pathname;
        var query = window.location.search || "";
        var hash = window.location.hash || "";
        var base = "/myRSL";

        if (path.indexOf(base) === 0) {
          path = path.slice(base.length);
        }

        if (!path.startsWith("/")) {
          path = "/" + path;
        }

        window.location.replace(base + "/#" + path + query + hash);
      })();
    </script>
  </head>
  <body></body>
</html>
